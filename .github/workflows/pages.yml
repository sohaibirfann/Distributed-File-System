name: Deploy landing page

# Publishes landing/index.html to GitHub Pages on every push to main that
# touches it. One-time setup: repo Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing # serves landing/index.html at the site root
      - id: deployment
        uses: actions/deploy-pages@v4
