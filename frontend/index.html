<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark" />
    <script>
      (function(){var t=localStorage.getItem('theme');if(t==='dark'||!t){document.documentElement.classList.add('dark');}})();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Distributed File System</title>
    <!-- The UI uses the OS system font stack (Segoe UI Variable on Windows),
         so no web fonts are fetched — keeps the desktop app fully offline. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
