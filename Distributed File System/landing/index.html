  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   DFS — Distributed File System · Landing page\n   Warm-dark aesthetic · 3 switchable directions (themes)\n   ============================================================ */\n\n/* ---------- Reset ---------- */\n*, *::before, *::after { box-sizing: border-box; }\n* { margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }\nbody {\n  font-family: var(--font-sans);\n  background: var(--bg);\n  color: var(--fg);\n  line-height: 1.5;\n  font-size: 17px;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  overflow-x: hidden;\n}\nimg { display: block; max-width: 100%; }\na { color: inherit; text-decoration: none; }\nbutton { font: inherit; color: inherit; cursor: pointer; background: none; border: none; }\n::selection { background: var(--accent); color: var(--on-accent); }\n\n/* ============================================================\n   THEME TOKENS — three distinct directions\n   ============================================================ */\n:root {\n  --font-sans: \"Hanken Grotesk\", system-ui, sans-serif;\n  --font-mono: \"JetBrains Mono\", ui-monospace, monospace;\n  --font-display: var(--font-sans);\n\n  --maxw: 1180px;\n  --gut: 28px;\n\n  --r-sm: 10px;\n  --r-md: 16px;\n  --r-lg: 24px;\n  --r-xl: 32px;\n  --r-pill: 999px;\n\n  --ease: cubic-bezier(.22,.61,.36,1);\n  --ease-out: cubic-bezier(.16,1,.3,1);\n\n  --tap: 48px;\n}\n\n/* ---------- EMBER (warm charcoal + marigold) ---------- */\n[data-theme=\"ember\"] {\n  --bg:        oklch(0.165 0.013 58);\n  --bg-2:      oklch(0.205 0.014 60);\n  --card:      oklch(0.232 0.016 62);\n  --card-2:    oklch(0.27 0.018 62);\n  --line:      oklch(0.33 0.016 62);\n  --line-soft: oklch(0.28 0.014 62);\n  --fg:        oklch(0.965 0.012 75);\n  --fg-2:      oklch(0.76 0.022 68);\n  --fg-3:      oklch(0.6 0.02 66);\n  --accent:    oklch(0.8 0.155 68);\n  --accen }\n.notcard { padding: 24px; border: 1px solid var(--line-soft); border-radius: var(--r-card); background: var(--card); }\n.notcard .x { font-family: var(--font-mono); font-size: 13px; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }\n.notcard .x svg { width: 16px; height: 16px; }\n.notcard p { font-size: 15px; }\n.notcard p b { color: var(--fg); }\n\n/* ============================================================\n   DOWNLOAD CTA\n   ============================================================ */\n.dl { padding: clamp(70px, 9vw, 130px) 0; }\n.dl-panel {\n  position: relative; overflow: hidden;\n  border: 1px solid var(--line); border-radius: var(--r-xl);\n  background:\n    radial-gradient(700px 400px at 50% -10%, var(--glow), transparent 60%),\n    var(--card);\n  padding: clamp(40px, 6vw, 72px) var(--gut);\n  text-align: center;\n}\n.dl-panel h2 { font-family: var(--font-display); font-weight: 800; font-size: clamp(30px,4.6vw,50px); letter-spacing: -0.03em; line-height: 1.04; }\n[data-theme=\"lime\"] .dl-panel h2 { font-weight: 600; }\n.dl-panel > p { color: var(--fg-2); font-size: 18px; max-width: 480px; margin: 16px auto 0; }\n.platforms { display: flex; justify-content: center; flex-wrap: wrap; gap: 14px; margin: 36px 0 18px; }\n.plat {\n  display: flex; align-items: center; gap: 12px;\n  padding: 14px 22px; min-height: 56px;\n  border: 1px solid var(--line); border-radius: var(--r-pill);\n  background: var(--bg-2); position: relative;\n  transition: border-color .2s, transform .2s;\n}\n.plat:hover { border-color: var(--accent); transform: translateY(-2px); }\n.plat svg { width: 22px; height: 22px; color: var(--fg); }\n.plat .pt { text-align: left; }\n.plat .pt b { display: block; font-size: 15px; font-weight: 600; }\n.plat .pt small { font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--accent-ink); }\n.dl-reassure { font-family: var(--font-mono); font-size: 13px; color: var(--fg-2); display: inline-flex; gap: 8px; align-items: center; }\n.dl-reassure svg { width: 15px; height: 15px; color: var(--accent); }\n\n/* ============================================================\n   FOOTER\n   ============================================================ */\n.foot { border-top: 1px solid var(--line-soft); padding: 56px 0 40px; }\n.foot-in { display: flex; justify-content: space-between; gap: 32px; flex-wrap: wrap; align-items: flex-start; }\n.foot .brand { margin-bottom: 14px; }\n.foot .tag { color: var(--fg-2); font-size: 14.5px; max-width: 320px; }\n.foot-links { display: flex; gap: 60px; flex-wrap: wrap; }\n.foot-col h5 { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 14px; }\n.foot-col a { display: block; font-size: 14.5px; color: var(--fg-2); padding: 5px 0; transition: color .2s; }\n.foot-col a:hover { color: var(--accent-ink); }\n.foot-bottom { margin-top: 44px; padding-top: 22px; border-top: 1px solid var(--line-soft); display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); }\n\n/* ============================================================\n   RESPONSIVE\n   ============================================================ */\n@media (max-width: 980px) {\n  .hero-grid { grid-template-columns: 1fr; gap: 44px; }\n  .hero-art { max-width: 560px; }\n  .appwin { width: 100%; border-right: 1px solid var(--line); border-radius: var(--r-lg); }\n  .appwin .appbar { border-radius: var(--r-lg) var(--r-lg) 0 0; }\n  .trust-grid { grid-template-columns: 1fr; gap: 36px; }\n  .trust-panel { position: static; }\n  .facts-in { grid-template-columns: repeat(3, 1fr); }\n  .fact:nth-child(3) { border-right: none; }\n  .fact:nth-child(n+4) { border-top: 1px solid var(--line-soft); }\n  .feat-grid { grid-template-columns: repeat(2, 1fr); }\n  .not-grid { grid-template-columns: 1fr; }\n}\n@media (max-width: 760px) {\n  body { font-size: 16px; }\n  .nav-links { display: none; }\n  .themer .lbl { display: none; }\n  .hiw-stage { height: 560px; }\n  .feat-grid { grid-template-columns: 1fr; }\n  .facts-in { grid-template-columns: repeat(2, 1fr); }\n  .fact { border-right: none; border-bottom: 1px solid var(--line-soft); }\n  .foot-in { flex-direction: column; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ============================= NAV ============================= -->\n<header class=\"nav\" id=\"nav\">\n  <div class=\"wrap nav-in\">\n    <a class=\"brand\" href=\"#top\" aria-label=\"DFS home\">\n      <svg class=\"mark\" viewBox=\"0 0 30 30\" fill=\"none\" aria-hidden=\"true\">\n        <rect x=\"2.5\" y=\"2.5\" width=\"11\" height=\"11\" rx=\"3.2\" fill=\"var(--accent)\"><\u002Frect>\n        <rect x=\"16.5\" y=\"2.5\" width=\"11\" height=\"11\" rx=\"3.2\" fill=\"var(--fg)\" opacity=\".28\"><\u002Frect>\n        <rect x=\"2.5\" y=\"16.5\" width=\"11\" height=\"11\" rx=\"3.2\" fill=\"var(--fg)\" opacity=\".28\"><\u002Frect>\n        <rect x=\"16.5\" y=\"16.5\" width=\"11\" height=\"11\" rx=\"3.2\" fill=\"var(--accent)\" opacity=\".55\"><\u002Frect>\n      <\u002Fsvg>\n      <span class=\"name\"><b>DFS<\u002Fb><\u002Fspan>\n    <\u002Fa>\n\n    <nav class=\"nav-links\" aria-label=\"Primary\">\n      <a href=\"#how\">How it works<\u002Fa>\n      <a href=\"#features\">Features<\u002Fa>\n      <a href=\"#security\">Security<\u002Fa>\n      <a href=\"#specs\">Specs<\u002Fa>\n    <\u002Fnav>\n\n    <div class=\"themer\">\n      <span class=\"lbl\">Theme<\u002Fspan>\n      <div class=\"swatches\" role=\"group\" aria-label=\"Color direction\">\n        <button class=\"swatch sw-ember\" data-set-theme=\"ember\" aria-pressed=\"true\" aria-label=\"Ember (amber)\" title=\"Ember\"><\u002Fbutton>\n        <button class=\"swatch sw-coral\" data-set-theme=\"coral\" aria-pressed=\"false\" aria-label=\"Coral (salmon)\" title=\"Coral\"><\u002Fbutton>\n        \n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <a class=\"btn btn-primary\" href=\"#download\">Download<\u002Fa>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main id=\"top\">\n\n<!-- ============================= HERO ============================= -->\n<section class=\"hero\">\n  <div class=\"wrap hero-grid\">\n    <div class=\"hero-copy\">\n      <span class=\"eyebrow reveal\">Distributed File System<\u002Fspan>\n      <h1 class=\"reveal\" data-d=\"1\">Your files.<br><span class=\"hl\">Encrypted<\u002Fspan> and everywhere.<\u002Fh1>\n      <p class=\"hero-sub reveal\" data-d=\"2\">A private, invite-only place to share files with people you trust. Encrypted on your device, split into pieces, and spread across your group's own machines — so no company holds your data, and no server can read it.<\u002Fp>\n      <div class=\"hero-cta reveal\" data-d=\"3\">\n        <a class=\"btn btn-primary\" href=\"#download\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12m0 0l4-4m-4 4l-4-4M4 19h16\"><\u002Fpath><\u002Fsvg>\n          Download the app\n        <\u002Fa>\n        <a class=\"btn btn-ghost\" href=\"#how\">See how it works<\u002Fa>\n      <\u002Fdiv>\n      <span class=\"reassure reveal\" data-d=\"4\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"11\" width=\"14\" height=\"9\" rx=\"2\"><\u002Frect><path d=\"M8 11V8a4 4 0 0 1 8 0v3\"><\u002Fpath><\u002Fsvg>\n        Your keys never leave your device.\n      <\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"hero-art reveal\" data-d=\"2\">\n      <div class=\"fchunk a\"><i><\u002Fi>chunk · 0x2af<\u002Fdiv>\n      <div class=\"fchunk b\"><i><\u002Fi>replicated ×3<\u002Fdiv>\n      <div class=\"fchunk c\"><i><\u002Fi>node · online<\u002Fdiv>\n      <div class=\"appwin\">\n        <div class=\"appshot\">\n          <img src=\"e61299f4-8c37-41f6-ab63-f2aa30e87f14\" alt=\"DFS desktop app showing the Family Photos group with encrypted files\" width=\"1860\" height=\"1200\" loading=\"lazy\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================= FACTS ============================= -->\n<section class=\"facts\" id=\"specs\">\n  <div class=\"wrap facts-in\">\n    <div class=\"fact reveal\"><div class=\"k\">Encryption<\u002Fdiv><div class=\"v\">AES-256-GCM<small>on your device<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n    <div class=\"fact reveal\" data-d=\"1\"><div class=\"k\">Keys held by<\u002Fdiv><div class=\"v\">You only<small>&amp; your group<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n    <div class=\"fact reveal\" data-d=\"2\"><div class=\"k\">Replication<\u002Fdiv><div class=\"v\">2× → all<small>per-group<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n    <div class=\"fact reveal\" data-d=\"3\"><div class=\"k\">Max file size<\u002Fdiv><div class=\"v\">500 MB<small>per file<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n    <div class=\"fact reveal\" data-d=\"4\"><div class=\"k\">Platform<\u002Fdiv><div class=\"v\">Desktop<small>Win · macOS · Linux<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n    <div class=\"fact reveal\" data-d=\"5\"><div class=\"k\">Storage<\u002Fdiv><div class=\"v\">Your machines<small>not a cloud<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================= FEATURES ============================= -->\n<section class=\"section\" id=\"features\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <span class=\"eyebrow\">What you get<\u002Fspan>\n      <h2>Privacy by architecture, not by promise.<\u002Fh2>\n      <p>Every part of DFS is built so that no company — including us — ever holds your files or your keys.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"feat-grid\">\n      <article class=\"fcard reveal\">\n        <span class=\"ix\">01<\u002Fspan>\n        <div class=\"ficon\" data-ic=\"lock\"><\u002Fdiv>\n        <h3>End-to-end encrypted<\u002Fh3>\n        <p>Files are encrypted on your device before they ever leave it. The coordinator and storage nodes only ever handle ciphertext.<\u002Fp>\n        <div class=\"tag\">// plaintext never leaves<\u002Fdiv>\n      <\u002Farticle>\n      <article class=\"fcard reveal\" data-d=\"1\">\n        <span class=\"ix\">02<\u002Fspan>\n        <div class=\"ficon\" data-ic=\"key\"><\u002Fdiv>\n        <h3>Your keys, your device<\u002Fh3>\n        <p>Each group's key is generated on-device and shared only through its invite. No server ever holds a key to your files.<\u002Fp>\n        <div class=\"tag\">// zero key custody<\u002Fdiv>\n      <\u002Farticle>\n      <article class=\"fcard reveal\" data-d=\"2\">\n        <span class=\"ix\">03<\u002Fspan>\n        <div class=\"ficon\" data-ic=\"shield\"><\u002Fdiv>\n        <h3>Fault tolerant<\u002Fh3>\n        <p>Every chunk is replicated across multiple members' machines. Anyone can go offline and your files stay fully recoverable.<\u002Fp>\n        <div class=\"tag\">// survives nodes dropping<\u002Fdiv>\n      <\u002Farticle>\n      <article class=\"fcard reveal\">\n        <span class=\"ix\">04<\u002Fspan>\n        <div class=\"ficon\" data-ic=\"bolt\"><\u002Fdiv>\n        <h3>Parallel downloads<\u002Fh3>\n        <p>Chunks are fetched simultaneously from the group's machines — assembly is as fast as your fastest peers.<\u002Fp>\n        <div class=\"tag\">// fetch in parallel<\u002Fdiv>\n      <\u002Farticle>\n      <article class=\"fcard reveal\" data-d=\"1\">\n        <span class=\"ix\">05<\u002Fspan>\n        <div class=\"ficon\" data-ic=\"node\"><\u002Fdiv>\n        <h3>Contribute storage<\u002Fh3>\n        <p>The desktop app turns your machine into a storage node, holding encrypted chunks for your groups — with a quota you set.<\u002Fp>\n        <div class=\"tag\">// you set the quota<\u002Fdiv>\n      <\u002Farticle>\n      <article class=\"fcard reveal\" data-d=\"2\">\n        <span class=\"ix\">06<\u002Fspan>\n        <div class=\"ficon\" data-ic=\"invite\"><\u002Fdiv>\n        <h3>Invite-only groups<\u002Fh3>\n        <p>Create a private group, share an invite link, and your files live distributed across just your members — no one else.<\u002Fp>\n        <div class=\"tag\">// outsiders can't peek<\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================= HOW IT WORKS ============================= -->\n<section class=\"section\" id=\"how\">\n  <div class=\"wrap\">\n    <div class=\"hiw-top\">\n      <div class=\"section-head reveal\" style=\"margin-bottom:0\">\n        <span class=\"eyebrow\">How it works<\u002Fspan>\n        <h2>Encrypt. Distribute. Access.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"hiw-tabs reveal\" role=\"tablist\" aria-label=\"How it works steps\">\n        <button class=\"hiw-tab\" role=\"tab\" data-phase=\"encrypt\" aria-selected=\"true\"><span class=\"n\">01<\u002Fspan>Encrypt<\u002Fbutton>\n        <button class=\"hiw-tab\" role=\"tab\" data-phase=\"distribute\" aria-selected=\"false\"><span class=\"n\">02<\u002Fspan>Distribute<\u002Fbutton>\n        <button class=\"hiw-tab\" role=\"tab\" data-phase=\"access\" aria-selected=\"false\"><span class=\"n\">03<\u002Fspan>Access<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hiw-stage-wrap reveal\" data-d=\"1\">\n      <div class=\"hiw-stage\" id=\"hiwStage\">\n        <div class=\"coord\"><span class=\"dot\"><\u002Fspan>Coordinator · <b>sees ciphertext only<\u002Fb><\u002Fdiv>\n        <!-- nodes injected by JS -->\n      <\u002Fdiv>\n      <div class=\"hiw-caption\">\n        <span class=\"num\" id=\"hiwNum\">01<\u002Fspan>\n        <p id=\"hiwText\"><b>Encrypt.<\u002Fb> Your file is encrypted on your device with your group's key, then split into chunks. Plaintext never leaves your machine.<\u002Fp>\n        <div class=\"hiw-prog\"><i class=\"on\"><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================= TRUST / SECURITY ============================= -->\n<section class=\"section trust\" id=\"security\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <span class=\"eyebrow\">The trust story<\u002Fspan>\n      <h2>No company stores your files. No server holds your keys.<\u002Fh2>\n      <p>DFS is zero-knowledge by design. Here's exactly what each part can and cannot see.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"trust-grid\">\n      <div class=\"trust-list\">\n        <div class=\"tpoint reveal\">\n          <div class=\"ti\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"11\" width=\"14\" height=\"9\" rx=\"2\"><\u002Frect><path d=\"M8 11V8a4 4 0 0 1 8 0v3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div><h4>AES-256-GCM, client-side<\u002Fh4><p>Encryption is performed in the browser with Web Crypto <span class=\"mono\">before<\u002Fspan> a single byte is uploaded.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tpoint reveal\" data-d=\"1\">\n          <div class=\"ti\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"8\" cy=\"14\" r=\"4\"><\u002Fcircle><path d=\"M11 11l8-8m-3 0h3v3m-6 3l2 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div><h4>Keys live only on devices<\u002Fh4><p>A group's key is delivered through its invite and never transmitted to or stored on any server.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tpoint reveal\" data-d=\"2\">\n          <div class=\"ti\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l8 3v6c0 5-3.5 7.5-8 9-4.5-1.5-8-4-8-9V6z\"><\u002Fpath><path d=\"M9 12l2 2 4-4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div><h4>Zero-knowledge coordinator<\u002Fh4><p>The cloud coordinator only tracks which groups and members exist, who's online, and which encrypted chunk lives where.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tpoint reveal\" data-d=\"3\">\n          <div class=\"ti\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"4\" width=\"7\" height=\"7\" rx=\"2\"><\u002Frect><rect x=\"13\" y=\"13\" width=\"7\" height=\"7\" rx=\"2\"><\u002Frect><path d=\"M11 7.5h2a2 2 0 0 1 2 2v2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div><h4>Group isolation<\u002Fh4><p>Two groups can't see or decrypt each other's data. Each is its own private space with its own key.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <aside class=\"trust-panel reveal\" data-d=\"1\">\n        <span class=\"eyebrow\" style=\"margin-bottom:16px\">Who sees what<\u002Fspan>\n        <div class=\"zk-diagram\">\n          <div class=\"zk-row\">\n            <div class=\"zk-box\"><div class=\"t\">Your device<\u002Fdiv><div class=\"d\">plaintext + keys<\u002Fdiv><\u002Fdiv>\n            <span class=\"zk-arrow\">encrypt →<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"zk-row\">\n            <div class=\"zk-box opaque\"><div class=\"t\">Coordinator<\u002Fdiv><div class=\"d\">metadata only · no keys<\u002Fdiv><div class=\"cipher-strip\"><\u002Fdiv><\u002Fdiv>\n            <span class=\"zk-arrow\">relays →<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"zk-row\">\n            <div class=\"zk-box opaque\"><div class=\"t\">Storage nodes<\u002Fdiv><div class=\"d\">encrypted chunks only<\u002Fdiv><div class=\"cipher-strip\"><\u002Fdiv><\u002Fdiv>\n            <span class=\"zk-arrow\">→ peers<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"nuance\">\n          <b>One honest note<\u002Fb>\n          The coordinator may briefly relay <em>encrypted<\u002Fem> chunks today; the roadmap moves transfers fully peer-to-peer. Either way, it never touches your plaintext or keys.\n        <\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================= WHAT IT'S NOT ============================= -->\n<section class=\"section\" id=\"not\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <span class=\"eyebrow\">To be clear<\u002Fspan>\n      <h2>What DFS is <em>not<\u002Fem>.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"not-grid\">\n      <div class=\"notcard reveal\">\n        <div class=\"x\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M6 6l12 12M18 6L6 18\"><\u002Fpath><\u002Fsvg>not a public network<\u002Fdiv>\n        <p>It's <b>not<\u002Fb> a network of strangers — DFS is small, private, invite-only groups of people you actually trust.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"notcard reveal\" data-d=\"1\">\n        <div class=\"x\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M6 6l12 12M18 6L6 18\"><\u002Fpath><\u002Fsvg>not a self-hosted server<\u002Fdiv>\n        <p>It's <b>not<\u002Fb> a self-hosted Dropbox with one admin in control — it's a flat group of peers, no single owner of the data.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"notcard reveal\" data-d=\"2\">\n        <div class=\"x\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M6 6l12 12M18 6L6 18\"><\u002Fpath><\u002Fsvg>not another cloud<\u002Fdiv>\n        <p>It's <b>not<\u002Fb> a cloud that holds your data — no company stores, owns, or can read your files. Your group <em>is<\u002Fem> the network.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================= DOWNLOAD CTA ============================= -->\n<section class=\"dl\" id=\"download\">\n  <div class=\"wrap\">\n    <div class=\"dl-panel reveal\">\n      <span class=\"eyebrow\" style=\"justify-content:center;display:inline-flex\">Get DFS<\u002Fspan>\n      <h2>Distributed. Encrypted. Yours.<\u002Fh2>\n      <p>Make a group, invite a few people, and your files live across just your machines. Desktop builds are landing soon.<\u002Fp>\n      <div class=\"platforms\">\n        <div class=\"plat\" role=\"button\" tabindex=\"0\" aria-disabled=\"true\">\n          <svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M3 5.5L10 4.5V11H3V5.5M11 4.3L21 3V11H11V4.3M3 12H10V18.5L3 17.5V12M11 12H21V20L11 18.7V12Z\"><\u002Fpath><\u002Fsvg>\n          <span class=\"pt\"><b>Windows<\u002Fb><small>Coming soon<\u002Fsmall><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"plat\" role=\"button\" tabindex=\"0\" aria-disabled=\"true\">\n          <svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M16.5 3c.1 1.1-.3 2.2-1 3-.7.8-1.8 1.4-2.9 1.3-.1-1.1.4-2.2 1-2.9.8-.8 2-1.4 2.9-1.4M19 17.4c-.5 1.2-.8 1.7-1.5 2.7-.9 1.4-2.3 3.2-3.9 3.2-1.5 0-1.9-1-3.9-1-2 0-2.4 1-3.9 1-1.6 0-2.9-1.6-3.8-3C-1 16.6-1.3 11 1 8.2c1-1.5 2.6-2.4 4.1-2.4 1.6 0 2.6 1 3.9 1 1.3 0 2-1 3.9-1 1.3 0 2.7.7 3.7 2-3.2 1.8-2.7 6.4.4 7.6Z\"><\u002Fpath><\u002Fsvg>\n          <span class=\"pt\"><b>macOS<\u002Fb><small>Coming soon<\u002Fsmall><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"plat\" role=\"button\" tabindex=\"0\" aria-disabled=\"true\">\n          <svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2c-1.7 0-2.8 1.4-2.8 3.2 0 .8.2 1.7.5 2.4-.6.5-1.2 1.4-1.6 2.6-.5 1.4-1.4 2.3-2.2 3.3-.8 1-1.1 2.1-.6 2.8.3.4.8.5 1.2.4 0 .5.2 1 .6 1.4.9.8 2.5.9 3.9.9h.1c1.4 0 3-.1 3.9-.9.4-.4.6-.9.6-1.4.4.1.9 0 1.2-.4.5-.7.2-1.8-.6-2.8-.8-1-1.7-1.9-2.2-3.3-.4-1.2-1-2.1-1.6-2.6.3-.7.5-1.6.5-2.4C14.8 3.4 13.7 2 12 2Z\"><\u002Fpath><\u002Fsvg>\n          <span class=\"pt\"><b>Linux<\u002Fb><small>Coming soon<\u002Fsmall><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"dl-reassure\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"11\" width=\"14\" height=\"9\" rx=\"2\"><\u002Frect><path d=\"M8 11V8a4 4 0 0 1 8 0v3\"><\u002Fpath><\u002Fsvg>\n        Your keys never leave your device.\n      <\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<!-- ============================= FOOTER ============================= -->\n<footer class=\"foot\">\n  <div class=\"wrap foot-in\">\n    <div>\n      <a class=\"brand\" href=\"#top\">\n        <svg class=\"mark\" viewBox=\"0 0 30 30\" fill=\"none\" aria-hidden=\"true\">\n          <rect x=\"2.5\" y=\"2.5\" width=\"11\" height=\"11\" rx=\"3.2\" fill=\"var(--accent)\"><\u002Frect>\n          <rect x=\"16.5\" y=\"2.5\" width=\"11\" height=\"11\" rx=\"3.2\" fill=\"var(--fg)\" opacity=\".28\"><\u002Frect>\n          <rect x=\"2.5\" y=\"16.5\" width=\"11\" height=\"11\" rx=\"3.2\" fill=\"var(--fg)\" opacity=\".28\"><\u002Frect>\n          <rect x=\"16.5\" y=\"16.5\" width=\"11\" height=\"11\" rx=\"3.2\" fill=\"var(--accent)\" opacity=\".55\"><\u002Frect>\n        <\u002Fsvg>\n        <span class=\"name\"><b>DFS<\u002Fb><\u002Fspan>\n      <\u002Fa>\n      <p class=\"tag\">Distributed File System — private, end-to-end encrypted file sharing that lives on your group's machines, not Big Tech's cloud.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"foot-links\">\n      <div class=\"foot-col\">\n        <h5>Product<\u002Fh5>\n        <a href=\"#features\">Features<\u002Fa>\n        <a href=\"#how\">How it works<\u002Fa>\n        <a href=\"#specs\">Specs<\u002Fa>\n        <a href=\"#download\">Download<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"foot-col\">\n        <h5>Trust<\u002Fh5>\n        <a href=\"#security\">Security<\u002Fa>\n        <a href=\"#security\">Encryption<\u002Fa>\n        <a href=\"#not\">What it's not<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"wrap foot-bottom\">\n    <span>© 2026 DFS · Distributed File System<\u002Fspan>\n    <span>Your files. Encrypted and everywhere.<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script src=\"739fb9b7-ead6-4bcb-a389-e07d69cc0fec\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
